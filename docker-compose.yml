services:
  db:
    image: postgres:16-alpine
    container_name: socialflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: socialflowdb
    ports:
      - "5433:5432"  # mapped to 5433 on your machine to avoid clashing with any local Postgres already using 5432
    volumes:
      - socialflow_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: socialflow-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/socialflowdb
      HF_API_TOKEN: ${HF_API_TOKEN}
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  socialflow_pgdata:
